<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" role="img" aria-label="Diagram of COVID-19 virus with spikes and replicase labeled">
  <defs>
    <style>
      /* Typography */
      .title { font: 700 32px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#111827; }
      .label { font: 650 17px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#111827; }
      .small { font: 500 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; fill:#111827; opacity:0.9; }

      /* Diagram strokes */
      .callout { stroke:#111827; stroke-width:2.25; fill:none; }
      .outline { stroke:#7c2d12; stroke-width:4.5; fill:none; }

      /* Shapes (more muted, flatter) */
      .bg { fill:#f8fafc; }
      .envelope { fill:#ef4444; opacity:0.9; stroke:#7f1d1d; stroke-width:5; }
      .core { fill:#f59e0b; opacity:0.85; stroke:#92400e; stroke-width:4; }
      .rna { stroke:#2563eb; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; opacity:0.95; }
      .replicase { fill:#6d28d9; opacity:0.9; stroke:#4c1d95; stroke-width:2.5; }

      /* Spike styling (simplified) */
      .spikeStem { stroke:#0f766e; stroke-width:5.5; stroke-linecap:round; }
      .spikeHead { fill:#14b8a6; stroke:#0f766e; stroke-width:2.75; }
      .spikeHighlight { stroke:#111827; stroke-width:3.5; fill:none; opacity:0.5; }

      /* Labels */
      .labelBox { fill:#ffffff; stroke:#111827; stroke-width:2; }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- Title -->
  <text x="60" y="70" class="title">COVID-19 Virus</text>

  <!-- Virus diagram -->
  <g transform="translate(0,10)">
    <!-- Spikes around envelope -->
    <g id="spikes">
      <!-- Top -->
      <line x1="450" y1="150" x2="450" y2="112" class="spikeStem"/>
      <circle cx="450" cy="100" r="14.5" class="spikeHead"/>

      <!-- Top-right -->
      <line x1="565" y1="180" x2="596" y2="154" class="spikeStem"/>
      <circle cx="610" cy="142" r="14.5" class="spikeHead"/>

      <!-- Right (this one is called out) -->
      <line x1="615" y1="280" x2="656" y2="280" class="spikeStem"/>
      <circle cx="675" cy="280" r="14.5" class="spikeHead"/>

      <!-- Bottom-right -->
      <line x1="570" y1="380" x2="602" y2="406" class="spikeStem"/>
      <circle cx="616" cy="418" r="14.5" class="spikeHead"/>

      <!-- Bottom -->
      <line x1="450" y1="410" x2="450" y2="450" class="spikeStem"/>
      <circle cx="450" cy="468" r="14.5" class="spikeHead"/>

      <!-- Bottom-left -->
      <line x1="330" y1="380" x2="298" y2="406" class="spikeStem"/>
      <circle cx="284" cy="418" r="14.5" class="spikeHead"/>

      <!-- Left -->
      <line x1="285" y1="280" x2="244" y2="280" class="spikeStem"/>
      <circle cx="225" cy="280" r="14.5" class="spikeHead"/>

      <!-- Top-left -->
      <line x1="335" y1="180" x2="304" y2="154" class="spikeStem"/>
      <circle cx="290" cy="142" r="14.5" class="spikeHead"/>
    </g>

    <!-- Envelope -->
    <circle cx="450" cy="280" r="170" class="envelope"/>

    <!-- Core -->
    <circle cx="450" cy="280" r="110" class="core"/>

    <!-- RNA -->
    <path class="rna"
          d="M 382 287
             C 405 238, 452 236, 474 280
             C 498 326, 540 324, 556 276
             C 574 226, 522 206, 496 236
             C 470 266, 432 266, 410 300
             C 389 337, 432 356, 458 329
             C 483 304, 516 306, 528 334" />

    <!-- Replicase (protein complex, stylized but cleaner) -->
    <g id="replicase">
      <path class="replicase"
            d="M 468 250
               C 497 238, 525 260, 522 291
               C 518 321, 486 334, 463 317
               C 441 301, 438 270, 455 255
               C 459 251, 463 250, 468 250 Z"/>
      <circle cx="492" cy="276" r="7" fill="#8b5cf6" opacity="0.9"/>
      <circle cx="471" cy="292" r="6" fill="#8b5cf6" opacity="0.9"/>
      <circle cx="505" cy="300" r="5.5" fill="#8b5cf6" opacity="0.9"/>
    </g>

    <!-- Highlight ring around called-out spike -->
    <circle cx="675" cy="280" r="23" class="spikeHighlight"/>
  </g>

  <!-- Callouts -->
  <!-- Replicase callout: arrowhead now touches replicase (points to ~[492,276]) -->
  <line x1="760" y1="230" x2="505" y2="286" class="callout" marker-end="url(#arrow)"/>
  <rect x="760" y="200" width="122" height="62" rx="10" class="labelBox"/>
  <text x="772" y="229" class="label">Replicase</text>
  <text x="772" y="252" class="small">(inside virus)</text>

  <!-- Spike callout -->
  <line x1="785" y1="330" x2="690" y2="290" class="callout" marker-end="url(#arrow)"/>
  <rect x="785" y="300" width="95" height="50" rx="10" class="labelBox"/>
  <text x="797" y="332" class="label">Spike</text>

  <!-- Caption -->
  <text x="60" y="545" class="small" opacity="0.75">Stylized educational diagram (not to scale).</text>
</svg>